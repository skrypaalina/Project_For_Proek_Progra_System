<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Star — Бронювання квитків</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header id="header" class="main-header"></header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Дивись найкращі фільми</h1>
                <p>Обирай сеанс та бронюй квитки онлайн за лічені хвилини</p>
            </div>
        </section>

        <section class="movies-section">
            <div class="container">
                <h2>Популярні в прокаті</h2>
                <div id="movies" class="movie-grid">
                    <p class="loading">Завантаження фільмів...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/components/header.js"></script>
    <script type="module" src="/js/pages/movies.js"></script>
