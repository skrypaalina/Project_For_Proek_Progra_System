<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — Cinema Star</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .login-container h2 {
            margin-bottom: 25px;
            font-size: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: 2px solid #e50914;
        }
        .register-link {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #b3b3b3;
            text-decoration: none;
        }
        .register-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <header id="header" class="main-header"></header>

    <main class="container">
        <div class="login-container">
            <h2>Створити акаунт</h2>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="firstName" placeholder="Ваше ім'я" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn">Зареєструватися</button>
            </form>
            <a href="login.html" class="register-link">Вже маєте акаунт? Увійти</a>
        </div>
    </main>

    <script type="module" src="/components/header.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const firstName = document.getElementById('firstName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('#registerForm .btn');
            
            submitBtn.innerText = "Створення...";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        first_name: firstName,
                        email: email, 
                        password: password 
                    })
                });

                if (response.ok) {
                    alert("Акаунт успішно створено! Тепер ви можете увійти.");
                    window.location.href = "login.html"; 
                } else {
                    const errorData = await response.json();
                    alert("Помилка: " + (errorData.detail || "Не вдалося зареєструватися. Можливо, такий email вже існує."));
                    submitBtn.innerText = "Зареєструватися"; 
                }
            } catch (error) {
                console.error("Помилка:", error);
                alert("Не вдалося з'єднатися з сервером.");
                submitBtn.innerText = "Зареєструватися";
            }
        });
    </script>

</body>
</html>
