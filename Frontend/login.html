<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Cinema Star</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .login-container h2 {
            margin-bottom: 25px;
            font-size: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: 2px solid #e50914;
        }
        .register-link {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #b3b3b3;
            text-decoration: none;
        }
        .register-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <header id="header" class="main-header"></header>

    <main class="container">
        <div class="login-container">
            <h2>Увійти</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn">Увійти</button>
            </form>
            <a href="register.html" class="register-link">Ще не зареєстровані? Створити акаунт</a>
        </div>
    </main>

    <script type="module" src="/components/header.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('#loginForm .btn');
            
            submitBtn.innerText = "Перевірка...";

            try {
                const response = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Зберігаємо user_id у пам'ять браузера
                    localStorage.setItem('user_id', data.user_id);
                    
                    alert("Успішний вхід!");
                    window.location.href = "index.html"; 
                } else {
                    const errorData = await response.json();
                    // Тепер сервер віддасть гарну помилку, якщо пароль не підійде
                    alert("Помилка: " + (errorData.detail || "Неправильні дані для входу"));
                    submitBtn.innerText = "Увійти"; 
                }
            } catch (error) {
                console.error("Помилка:", error);
                alert("Не вдалося з'єднатися з сервером.");
                submitBtn.innerText = "Увійти";
            }
        });
    </script>

</body>
</html>
