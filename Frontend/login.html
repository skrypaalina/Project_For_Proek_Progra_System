<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Cinema Star</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .header-custom {
            display: flex;
            align-items: center;
            padding: 15px 5%;
            background: #000;
            border-bottom: 1px solid #222;
        }
        .logo-text { color: #e50914; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        
        .back-btn-square {
            width: 40px;
            height: 40px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            margin-left: 15px;
        }
        .back-btn-square:hover { background: #e50914; border-color: #e50914; }

        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: white;
        }
        .login-container h2 { margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus { outline: 2px solid #e50914; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .register-link { display: block; margin-top: 20px; text-align: center; color: #b3b3b3; text-decoration: none; }
    </style>
</head>
<body style="background: #141414; font-family: 'Inter', sans-serif; margin: 0;">

    <header class="header-custom">
        <a href="index.html" class="logo-text">Cinema Star</a>
        <button onclick="window.history.back()" class="back-btn-square" title="Назад">
            <i class="fas fa-chevron-left"></i>
        </button>
    </header>

    <main class="container">
        <div class="login-container">
            <h2>Увійти</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Увійти</button>
            </form>
            <a href="register.html" class="register-link">Ще не зареєстровані? Створити акаунт</a>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            const submitBtn = document.querySelector('#loginForm .btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.innerText = "Перевірка...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8005/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // КЛЮЧОВЕ ВИПРАВЛЕННЯ ТУТ:
                    // Зберігаємо саме 'first_name', як того чекає header.js
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('first_name', data.first_name); 
                    
                    // Для сумісності з іншими твоїми скриптами, якщо вони юзають 'user_name'
                    localStorage.setItem('user_name', data.first_name); 
                    
                    window.location.href = "index.html"; 
                } else {
                    alert(data.detail || "Неправильний email або пароль");
                    submitBtn.innerText = "Увійти"; 
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Не вдалося з'єднатися з сервером.");
                submitBtn.innerText = "Увійти";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
